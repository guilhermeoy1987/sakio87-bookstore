name: Python Action Demo

on:
  push:
    branches: [actiondemo, actiondemo2]

jobs:
  qa:
    name: Quality check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bookstore_db
          POSTGRES_USER: bookstore_user
          POSTGRES_PASSWORD: bookstore_password
          # Esta linha permite que o Django crie o banco de teste sem ser barrado
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Run Tests
        env:
          # Variáveis para o seu settings.py
          SQL_ENGINE: django.db.backends.postgresql
          SQL_DATABASE: bookstore_db
          SQL_USER: bookstore_user
          SQL_PASSWORD: bookstore_password
          SQL_HOST: 127.0.0.1
          SQL_PORT: 5432
          # Variáveis que forçam o driver do Postgres a usar as credenciais corretas
          PGUSER: bookstore_user
          PGPASSWORD: bookstore_password
          USER: bookstore_user
        run: |
          poetry run python manage.py test
