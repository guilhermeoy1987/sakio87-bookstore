name: Python Pull Request Workflow

on:
  pull_request:
    branches: [main, master]

jobs:
  qa:
    name: Quality check
    runs-on: ubuntu-latest

    # Adicionamos um banco de dados temporário para os testes
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bookstore_db
          POSTGRES_USER: bookstore_user
          POSTGRES_PASSWORD: bookstore_password
        ports:
          - 5432:5432
        # Garante que o Postgres esteja pronto antes de começar
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          poetry install

      # Agora passamos as informações do banco para o Django rodar o teste
      - name: Run Tests
        env:
          DB_NAME: bookstore_db
          DB_USER: bookstore_user
          DB_PASSWORD: bookstore_password
          DB_HOST: localhost
          DB_PORT: 5432
        run: |
          poetry run python manage.py test

      - name: Wemake Python Styleguide
        uses: wemake-services/wemake-python-styleguide@0.19.2
        continue-on-error: true
        with:
          reporter: "github-pr-review"
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
